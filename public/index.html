<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PEPEGAS SERVER</title>

  <link rel="shortcut icon" href="pepe.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="transition.css">


</head>

<body>

  <main class="launcher">

    <h1 class="server-title">
      PEPEGAS SERVER
    </h1>

    <section class="panel">

      <div class="panel-top">

        <div class="panel-image">

          <img src="pepe.png" alt="Pepe">

        </div>

        <div class="status-info">

          <div class="status-item">

            <h4>STATUS</h4>

            <span id="status">--</span>

          </div>

          <div class="status-item">

            <h4>PLAYERS</h4>

            <span id="players">-- / --</span>

          </div>

          <div class="status-item">

            <h4>PING</h4>

            <span id="ping">--</span>

          </div>

        </div>

        <div class="panel-right">

          <div id="startSection">

            <button id="start" type="button">JOIN!</button>

          </div>

        </div>

      </div>

      <div class="players-box">

        <h4>ONLINE PLAYERS</h4>

        <div id="playerList">
          --
        </div>

      </div>

    </section>

  </main>

  <script src="transition.js"></script>
  <script src="app.js"></script>

</body>

</html>
